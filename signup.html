<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Level Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page-body"> 

    <div class="login-container">
        
        <div class="form-header" style="text-align: center; margin-bottom: 24px;">
            <h2 style="font-size: 24px; color: #0f172a; margin-bottom: 4px;">Create Account</h2>
            <p style="color: #64748b; font-size: 14px; margin: 0;">Join the academy and start your journey.</p>
        </div>

        <form id="signupForm">
            <div class="input-group" style="margin-bottom: 14px;">
                <label for="signupName" style="display: block; font-weight: 600; font-size: 14px; margin-bottom: 6px; color: #334155;">Full Name</label>
                <input type="text" id="signupName" placeholder="Your Name" required style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;">
            </div>

            <div class="input-group" style="margin-bottom: 14px;">
                <label for="signupEmail" style="display: block; font-weight: 600; font-size: 14px; margin-bottom: 6px; color: #334155;">Email Address</label>
                <input type="email" id="signupEmail" placeholder="name@example.com" required style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;">
            </div>

            <div class="input-group" style="margin-bottom: 14px;">
                <label for="signupPassword" style="display: block; font-weight: 600; font-size: 14px; margin-bottom: 6px; color: #334155;">Password</label>
                <input type="password" id="signupPassword" placeholder="Create Password" required style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;">
            </div>

            <div class="input-group" style="margin-bottom: 14px;">
                <label for="signupPhone" style="display: block; font-weight: 600; font-size: 14px; margin-bottom: 6px; color: #334155;">Phone Number</label>
                <input type="tel" id="signupPhone" placeholder="Your Phone Number" required style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;">
            </div>

            <div class="input-group" style="margin-bottom: 20px;">
                <label for="signupInterest" style="display: block; font-weight: 600; font-size: 14px; margin-bottom: 6px; color: #334155;">Primary Interest</label>
                <select id="signupInterest" required style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; background: white;">
                    <option value="" disabled selected>Select your core domain...</option>
                    <option value="cpp_dsa">Data Structures & Algorithms</option>
                    <option value="mern_stack">Full-Stack Web Development</option>
                    <option value="python_ai">Artificial Intelligence & Machine Learning</option>
                    <option value="iot_systems">IoT & Embedded Systems</option>
                    <option value="cyber_security">Cybersecurity & Ethical Hacking</option>
                </select>
            </div>

            <button type="submit" class="submit-btn" style="width: 100%; background: #0f172a; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: 600; cursor: pointer;">Sign Up Now</button>
            
            <div style="text-align: center; margin: 15px 0; color: #64748b; font-size: 14px;">OR</div>
            <button type="button" id="googleSignUpBtn" class="google-btn" style="width: 100%; background: white; color: #334155; border: 1px solid #cbd5e1; padding: 10px; border-radius: 6px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS6U4pRN-hmnCKRp5bBpsxjHfbbutWDEgFRUo0YrTP2ag&s=10" alt="Google Logo" style="width: 20px; height: 20px; object-fit: contain;"> Sign up with Google
            </button>
        </form>

        <div style="text-align: center; margin-top: 20px; font-size: 14px; color: #64748b;">
            Already have an account? <a href="login.html" style="color: #0f172a; font-weight: 600; text-decoration: none;">Login here</a>
        </div>

    </div>

    <script type="module" src="signup.js"></script>
</body>
</html>
