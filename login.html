<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Course Academy</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-page-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: calc(100vh - 100px); /* Centers card vertically below back button */
            padding: 20px;
            box-sizing: border-box;
        }
        .auth-card {
            background: #ffffff !important;
            width: 100%;
            max-width: 380px;
            padding: 25px !important;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08) !important;
            display: block !important; /* Forces it out of any hidden states */
            visibility: visible !important;
            opacity: 1 !important;
            height: auto !important;
        }
        .auth-redirect {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #64748b;
        }
        .auth-redirect a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 600;
        }
        .auth-redirect a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-brand">Level Up 🚀</div>
            <nav class="sidebar-menu">
                <a href="index.html" class="menu-item">
                    <span class="menu-icon">📚</span> All Courses
                </a>
                <a href="dashboard.html" class="menu-item">
                    <span class="menu-icon">📊</span> Dashboard
                </a>
                <a href="login.html" class="menu-item active">
                    <span class="menu-icon">🔐</span> Account Login
                </a>
            </nav>
        </aside>

        <div class="main-content" style="display: flex; flex-direction: column;">
            
            <div class="back-actions-wrapper">
                <a href="index.html" class="back-link-btn">
                    <span>←</span> Back to Courses
                </a>
            </div>

            <div class="auth-page-wrapper">
                <div class="auth-card">
                    <div class="form-header">
                        <h2>Welcome Back</h2>
                        <p>Log in to access your dashboard tracking</p>
                    </div>

                    <form id="loginForm">
                        <div class="input-group">
                            <label for="loginEmail">Email Address</label>
                            <input type="email" id="loginEmail" placeholder="Enter your email" required>
                        </div>

                        <div class="input-group">
                            <label for="loginPassword">Password</label>
                            <input type="password" id="loginPassword" placeholder="Enter your password" required>
                        </div>

                        <button type="submit" id="loginSubmitBtn" class="submit-btn">Sign In</button>
                        
                        <div style="text-align: center; margin: 12px 0; color: #64748b; font-size: 13px;">OR</div>
                        
                        <button type="button" id="googleLoginBtn" class="google-btn" style="width: 100%; background: white; color: #334155; border: 1px solid #cbd5e1; padding: 10px; border-radius: 6px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: background 0.2s; font-size: 14px;">
                            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS6U4pRN-hmnCKRp5bBpsxjHfbbutWDEgFRUo0YrTP2ag&s=10" alt="Google" style="width: 18px; height: 18px; object-fit: contain;"> Sign in with Google
                        </button>
                    </form>

                    <div class="auth-redirect">
                        Don't have an account? <a href="index.html">Pick a course to sign up</a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBrZt1VQZBGuJxjicaf1wf6gYDxMgV8QZc",
            authDomain: "level-up-4d81f.firebaseapp.com",
            projectId: "level-up-4d81f",
            storageBucket: "level-up-4d81f.firebasestorage.app",
            messagingSenderId: "1081711086792",
            appId: "1:1081711086792:web:5cc2a5f2d8b17d58bce9fd",
            measurementId: "G-PQGSMLSWY6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const loginForm = document.getElementById("loginForm");
        const submitBtn = document.getElementById("loginSubmitBtn");
        const googleBtn = document.getElementById("googleLoginBtn");

        // Regular Email/Password Sign In
        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPassword").value;

            submitBtn.innerText = "Verifying...";
            submitBtn.disabled = true;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Local session fallback wrapper
                const fallbackUser = {
                    name: email.split('@')[0], 
                    email: email,
                    enrolledCourses: ["mern_stack"], 
                    level: "intermediate",
                    goal: "Continue refining development engineering competencies."
                };

                const localData = JSON.parse(localStorage.getItem("currentUser"));
                if (!localData || localData.email !== email) {
                    localStorage.setItem("currentUser", JSON.stringify(fallbackUser));
                }

                window.location.href = "dashboard.html";
            } catch (error) {
                alert("Login Failed: " + error.message);
            } finally {
                submitBtn.innerText = "Sign In";
                submitBtn.disabled = false;
            }
        });

        // Google Authentication Panel Popup
        googleBtn.addEventListener("click", async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                const googleUserSession = {
                    name: user.displayName,
                    email: user.email,
                    enrolledCourses: ["mern_stack"], 
                    level: "beginner",
                    goal: "Enrolled seamlessly via Google authentication profile."
                };

                localStorage.setItem("currentUser", JSON.stringify(googleUserSession));
                window.location.href = "dashboard.html";
            } catch (error) {
                console.error("Google Authentication Error:", error);
                alert("Google Access Refused: " + error.message);
            }
        });
    </script>
</body>
</html>
